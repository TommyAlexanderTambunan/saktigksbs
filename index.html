<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0"/>
<meta name="theme-color" content="#064e3b"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="SAKTI GKSBS"/>
<title>SAKTI — GKSBS Bandar Sakti</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;font-family:Georgia,"Times New Roman",serif}
body{background:#f5f1eb;-webkit-font-smoothing:antialiased}
#root{min-height:100vh}
#splash{position:fixed;inset:0;background:#064e3b;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;z-index:9999;transition:opacity .4s ease}
.cr{font-size:58px;color:#fff;animation:glow 2s ease-in-out infinite}
.ti{color:#fff;font-size:19px;font-weight:400;letter-spacing:.08em;text-align:center}
.su{color:#6ee7b7;font-size:11px;letter-spacing:.06em}
.bar{width:150px;height:3px;background:rgba(255,255,255,.15);border-radius:2px;overflow:hidden}
.bar div{height:100%;background:#6ee7b7;border-radius:2px;animation:prog 3s forwards}
.er{color:#fca5a5;font-size:11px;text-align:center;padding:0 28px;line-height:1.6;max-width:280px;display:none}
@keyframes glow{0%,100%{opacity:1}50%{opacity:.55}}
@keyframes prog{0%{width:0}80%{width:85%}100%{width:100%}}
</style>
</head>
<body>

  <div class="ti">GKSBS BANDAR SAKTI</div>

</div>
